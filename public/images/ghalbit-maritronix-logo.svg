<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">GHALBIT MARITRONIX</title>
  <desc id="desc">Shield logo with anchor, wave, digital network, and wordmark for Ghalbit Maritronix.</desc>
  <defs>
    <linearGradient id="shieldGlow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#D9FBFF"/>
      <stop offset="0.45" stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#2B6DFF"/>
    </linearGradient>
    <linearGradient id="wordGlow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#F6FBFF"/>
      <stop offset="0.6" stop-color="#D5EBFF"/>
      <stop offset="1" stop-color="#8ACBFF"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="720" height="180" rx="28" fill="none"/>
  <g transform="translate(10 8)">
    <path d="M82 8l54 20v52c0 38-22 66-54 86C50 146 28 118 28 80V28L82 8z" fill="url(#shieldGlow)" filter="url(#softGlow)"/>
    <path d="M82 23l40 15v39c0 29-16 51-40 69C58 128 42 106 42 77V38l40-15z" fill="#041B2D" opacity="0.92"/>
    <path d="M82 38c8 0 13 6 13 13v6h7c4 0 6 4 4 7l-7 13v17h-7V76H82V57h-7v37h-7V77l-7-13c-2-3 0-7 4-7h7v-6c0-7 5-13 13-13z" fill="url(#shieldGlow)"/>
    <path d="M54 105c11-4 19-4 28 0 8 3 15 3 26 0" fill="none" stroke="#00D9FF" stroke-width="4" stroke-linecap="round"/>
    <circle cx="50" cy="51" r="3.5" fill="#00D9FF"/>
    <circle cx="114" cy="57" r="3.5" fill="#00D9FF"/>
    <circle cx="90" cy="122" r="3.5" fill="#00D9FF"/>
    <path d="M50 51l32 13 32-7-24 65" stroke="#29B6F6" stroke-width="2.5" opacity="0.8" fill="none"/>
  </g>
  <g transform="translate(170 44)">
