    <text x="2" y="90" fill="#B8D4E3" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Integrated Maritime &amp; Land Intelligence Platform</text>
    <text x="4" y="122" fill="#00D9FF" font-size="16" font-family="Segoe UI, Arial, sans-serif" letter-spacing="3">SEA • LAND • AI • DRONE • LOGISTICS</text>
  </g>
